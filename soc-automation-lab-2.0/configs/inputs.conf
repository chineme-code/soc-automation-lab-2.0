# ============================================================
# Splunk Universal Forwarder — inputs.conf
# SOC Automation Lab 2.0 | Chinemelum Osholake
# Place at: C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf
# After placing: restart SplunkForwarder service as Local System Account
# ============================================================

[WinEventLog://Security]
index = take-code
sourcetype = WinEventLog:Security
disabled = false
# Captures: logon events (4624), failed logons (4625), privilege use (4672)

[WinEventLog://System]
index = take-code
sourcetype = WinEventLog:System
disabled = false

[WinEventLog://Application]
index = take-code
sourcetype = WinEventLog:Application
disabled = false

[WinEventLog://Microsoft-Windows-Sysmon/Operational]
index = take-code
sourcetype = XmlWinEventLog:Sysmon
disabled = false
renderXml = true
# renderXml=true preserves full Sysmon XML field structure for richer parsing

[WinEventLog://Microsoft-Windows-PowerShell/Operational]
index = take-code
sourcetype = WinEventLog:PowerShell
disabled = false
# Captures ScriptBlock logging (EventID 4104) and module logging (4103)

[WinEventLog://Windows PowerShell]
index = take-code
sourcetype = WinEventLog:PowerShell-Classic
disabled = false

[WinEventLog://Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational]
index = take-code
sourcetype = WinEventLog:RDP
disabled = false
# RDP connection attempts — validates Kali brute-force test telemetry
